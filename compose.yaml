services:
  php:
    # Fixed the image tag
    image: 'php:8-fpm'
    stop_grace_period: 20s
    networks:
      - coolify-overlay
    deploy:
      replicas: 2
      update_config:
        order: start-first
        failure_action: rollback
        delay: 10s
      labels:
        - traefik.enable=true
        - traefik.http.routers.secubi-php.rule=Host(`your-domain.com`)
        - traefik.http.routers.secubi-php.entrypoints=http
        # IMPORTANT: PHP-FPM runs on 9000. 
        # If you aren't using an Nginx/Caddy container, Traefik needs to hit 9000.
        - traefik.http.services.secubi-php.loadbalancer.server.port=9000
    healthcheck:
      # Testing if the PHP process is responsive
      test: ["CMD", "php-fpm", "-t"] 
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  # This section tells Swarm to use the existing network Coolify created
  coolify-overlay:
    external: true
