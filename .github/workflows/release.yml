name: Build and Push Docker Images

on:
  push:
    branches:
      - '**' # TODO: remove after testing — temporary build on every commit
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push all images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate bake overrides
        id: tag
        run: |
          PREFIX="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          SHA_TAG="sha-${GITHUB_SHA::7}"

          SET_LINES=""
          for target in php queue; do
            SET_LINES="${SET_LINES}${target}.tags=${PREFIX}-${target}:${SHA_TAG}
          "
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              VERSION="${{ github.ref_name }}"
              SET_LINES="${SET_LINES}${target}.tags=${PREFIX}-${target}:${VERSION}
          ${target}.tags=${PREFIX}-${target}:${VERSION%.*}
          ${target}.tags=${PREFIX}-${target}:latest
          "
            elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
              SET_LINES="${SET_LINES}${target}.tags=${PREFIX}-${target}:latest
          "
            fi
            SET_LINES="${SET_LINES}${target}.cache-from=type=gha,scope=${target}
          ${target}.cache-to=type=gha,scope=${target},mode=max
          "
          done

          {
            echo "set<<EOF"
            echo "$SET_LINES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Compute PWA tags separately
          PWA_TAGS="${PREFIX}-pwa:${SHA_TAG}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            PWA_TAGS="${PWA_TAGS} ${PREFIX}-pwa:${VERSION} ${PREFIX}-pwa:${VERSION%.*} ${PREFIX}-pwa:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            PWA_TAGS="${PWA_TAGS} ${PREFIX}-pwa:latest"
          fi
          echo "pwa_tags=${PWA_TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push all services
        uses: docker/bake-action@v6
        with:
          files: |
            compose.yaml
          targets: php,queue
          push: true
          set: ${{ steps.tag.outputs.set }}
